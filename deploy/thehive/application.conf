## TheHive 5 — configuration applicative
## Monté en lecture seule dans le conteneur : /etc/thehive/application.conf
## Référence : https://docs.strangebee.com/thehive/installation/configuration/

## Base de données (graphe) — Cassandra
db.janusgraph {
  storage {
    backend = cql
    hostname = ["cassandra"]
    cql {
      cluster-name = thehive
      keyspace = thehive
    }
  }

  ## Index de recherche — Elasticsearch
  index.search {
    backend = elasticsearch
    hostname = ["elasticsearch"]
    index-name = thehive
  }
}

## Stockage des pièces jointes — MinIO (compatible S3)
## Les identifiants viennent des variables d'environnement du conteneur (voir docker-compose.yml)
storage {
  provider = s3
  s3 {
    bucket = "thehive"
    region = "us-east-1"
    endpoint = "http://minio:9000"
    access-key = ${?MINIO_USER}
    secret-key = ${?MINIO_PASSWORD}
    chunk-size = 1 MiB
    # MinIO impose le path-style
    aws.s3.path-style-access = true
  }
}

## Authentification (local par défaut ; ajoutez OIDC/LDAP en prod si besoin)
auth {
  providers = [
    { name = session }
    { name = basic, realm = thehive }
    { name = local }
    { name = key }
  ]
}

## Connexion à Cortex pour l'enrichissement (analyzers VirusTotal, MISP, ...)
## Renseignez la clé API Cortex après l'avoir générée dans l'UI Cortex (port 9001).
cortex {
  servers = [
    {
      name = local-cortex
      url = "http://cortex:9001"
      auth {
        type = "bearer"
        key = ${?CORTEX_API_KEY}
      }
    }
  ]
}

## Service de notifications / divers
play.http.parser.maxDiskBuffer = 50MB
play.http.parser.maxMemoryBuffer = 10MB
